<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <title>Sill OG · Option 1 (Dark hero)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: 'Hanken Grotesk', system-ui, sans-serif;
        color: #eef0e4;
        background: #1e3d2f;
        overflow: hidden;
        display: flex;
        align-items: stretch;
      }
      .left {
        flex: 1;
        padding: 72px 0 72px 88px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .eyebrow {
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 16px;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: #b6cf90;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
      }
      .eyebrow .dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        background: #9bb98a;
      }
      .wordmark {
        font-family: 'Newsreader', serif;
        font-size: 184px;
        line-height: .85;
        letter-spacing: -.03em;
        font-weight: 500;
        margin-bottom: 22px;
      }
      .tagline {
        font-family: 'Newsreader', serif;
        font-style: italic;
        font-size: 38px;
        line-height: 1.15;
        color: #9bb98a;
        max-width: 540px;
      }
      .url {
        margin-top: 56px;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 17px;
        letter-spacing: .12em;
        color: #b6cf90;
        text-transform: lowercase;
      }
      .right {
        flex: 0 0 520px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .disc {
        width: 388px;
        height: 388px;
        border-radius: 50%;
        background: #274a39;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .disc::before {
        content: '';
        position: absolute;
        inset: -22px;
        border-radius: 50%;
        background: #234234;
        z-index: -1;
      }
      .sprite {
        width: 296px;
        height: 296px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div class="left">
      <div class="eyebrow"><span class="dot"></span>plant care, lovingly</div>
      <div class="wordmark">Sill</div>
      <div class="tagline">A little care every day. Track watering, see what's thirsty.</div>
      <div class="url">pleasepleasepleasewater.me</div>
    </div>
